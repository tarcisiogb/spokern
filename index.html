<style>
:root{
  --felt:#25331c;        /* painel verde escuro (destaque) */
  --felt-2:#2d3e22;
  --felt-line:#3e5130;
  --bone:#ffffff;        /* superfície clara + texto sobre verde escuro */
  --bone-2:#e6e7e0;
  --ink:#0f1210;         /* preto do logo */
  --ink-soft:#6c7168;
  --brass:#87a85f;       /* VERDE da marca (destaque) */
  --brass-deep:#556d36;  /* verde profundo p/ contraste */
  --red:#b23a2e;
  --sage:#a2b393;        /* verde claro p/ texto sobre painel escuro */
  --shadow:0 8px 26px rgba(24,34,16,.10);
  --paper:#f3f4ee;       /* fundo da página */
  --line:#e4e5dd;
  --green-soft:#eaf3e0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink)}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:920px;margin:0 auto;padding:0 16px 96px}
.tabnum{font-variant-numeric:tabular-nums}

/* Header */
header.top{padding:22px 4px 8px;display:flex;align-items:center;gap:16px}
.brandwrap{display:flex;align-items:center;gap:18px;flex:1;justify-content:space-between}
.crest{display:none}
h1.brand{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:46px;line-height:.9;
  letter-spacing:-.03em;color:var(--ink);
}
h1.brand .hl{color:var(--brass)}
.season-row{margin:2px 4px 20px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.season{font-size:13px;color:var(--ink-soft);letter-spacing:.01em}
.season b{color:var(--ink);font-weight:700}
.season .dot{color:var(--brass);font-weight:800}
.fan{flex:0 0 auto}
@media(max-width:520px){
  h1.brand{font-size:38px}
  .fan{transform:scale(.82);transform-origin:right center}
}

/* Nav */
nav.tabs{
  display:flex;gap:4px;overflow-x:auto;margin:18px 0 20px;padding-bottom:4px;
  scrollbar-width:none;
}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs button{
  flex:0 0 auto;background:#fff;border:1px solid var(--line);
  color:var(--ink-soft);font-family:'Inter';font-size:13px;font-weight:600;
  padding:9px 15px;border-radius:999px;cursor:pointer;white-space:nowrap;
  transition:all .16s ease;letter-spacing:.01em;
}
nav.tabs button:hover{color:var(--brass-deep);border-color:var(--brass)}
nav.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
nav.tabs button.admin-tab{margin-left:auto;color:#98a08e;border-color:transparent;background:transparent;font-size:12px}
nav.tabs button.admin-tab:hover{color:var(--brass-deep)}
nav.tabs button.admin-tab.on{background:var(--brass-deep);color:#fff;border-color:var(--brass-deep)}

/* Cards / sections */
.panel{background:#fff;color:var(--ink);border-radius:16px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:16px}
.panel.dark{background:var(--felt);color:var(--bone);border:1px solid var(--felt-line);
  background-image:radial-gradient(130% 120% at 100% 0%, #2f4223 0%, var(--felt) 60%)}
.eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;font-weight:700;color:var(--brass-deep);margin-bottom:2px}
.panel.dark .eyebrow{color:var(--brass)}
.panel h2{font-family:'Archivo',sans-serif;font-weight:800;font-size:23px;margin-bottom:14px;letter-spacing:-.02em}
.muted{color:var(--ink-soft);font-size:13px}
.panel.dark .muted{color:var(--sage)}

/* Leaderboard */
.lb-row{
  display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;
  padding:12px 8px;border-bottom:1px solid var(--bone-2);
}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Archivo',sans-serif;font-weight:900;font-size:20px;text-align:center;color:var(--ink-soft)}
.lb-row.p1 .lb-rank,.lb-row.p2 .lb-rank,.lb-row.p3 .lb-rank{color:var(--brass-deep)}
.lb-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.lb-sub{font-size:11.5px;color:var(--ink-soft);font-weight:500;margin-top:1px}
.lb-pts{font-family:'Archivo',sans-serif;font-weight:900;font-size:23px;text-align:right}
.lb-pts small{font-family:'Inter';font-weight:600;font-size:11px;color:var(--ink-soft);display:block;text-align:right;margin-top:-2px}
.lb-row.p1{background:linear-gradient(90deg, var(--green-soft), rgba(234,243,224,0));border-radius:10px}
.mv-wrap{margin-top:2px;line-height:1}
.mv{font-size:10px;font-weight:800;display:inline-block}
.mv.up{color:#1f7a4d}
.mv.down{color:var(--red)}
.mv.eq{color:var(--ink-soft)}
.mv.new{color:var(--brass-deep);font-size:8.5px;font-weight:700}
.lb-brk{font-size:11px;margin-top:3px;display:flex;flex-wrap:wrap;gap:4px 8px}
.brk{color:var(--ink);font-weight:700}
.brk.minus{color:var(--red);font-weight:600}
.ctr{text-align:center !important}
.demo-banner{background:#fff5d6;border:1px solid #e6c65a;color:#7a5a12;font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:10px;margin-bottom:14px;text-align:center}

/* Season filter */
.range-picker{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;padding:12px;background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
.range-picker .field{flex:1 1 140px;min-width:130px}
.range-picker select{padding:9px 10px;font-size:13px}
.range-picker .btn{flex:0 0 auto;padding:10px 16px}
.season-chips{display:flex;flex-wrap:wrap;gap:6px}
.szchip{
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;
  background:#fff;border:1px solid var(--line);color:var(--ink-soft);
  transition:all .12s ease;user-select:none;
}
.szchip:hover{border-color:var(--brass)}
.szchip.on{background:var(--brass-deep);border-color:var(--brass-deep);color:#fff}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;background:var(--brass);color:#20300f;letter-spacing:.05em}
.badge.grey{background:var(--bone-2);color:var(--ink-soft)}
.pen{color:var(--red);font-size:11px;font-weight:600}

/* Stat grid */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:var(--felt);border:1px solid var(--felt-line);border-radius:12px;padding:14px}
.stat .k{font-size:11px;color:var(--sage);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.stat .v{font-family:'Archivo',sans-serif;font-weight:900;font-size:20px;margin-top:4px;color:var(--bone);letter-spacing:-.02em;line-height:1.15}
.stat .v.brass{color:var(--brass)}
.stat .v.red{color:#e0968b}

/* Progress */
.prog{height:12px;background:var(--felt);border:1px solid var(--felt-line);border-radius:999px;overflow:hidden;margin:10px 0 6px}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-deep),var(--brass));border-radius:999px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--bone-2);white-space:nowrap}
th{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
td.num{text-align:right;font-variant-numeric:tabular-nums}
th.num{text-align:right}
.panel.dark th{color:var(--sage);border-color:var(--felt-line)}
.panel.dark td{border-color:var(--felt-line)}

/* Frozen panes: header row + first column */
.tblwrap{overflow:auto;max-height:72vh}
.tblwrap table thead th{position:sticky;top:0;z-index:2;background:#fff}
.tblwrap table th:first-child,.tblwrap table td:first-child{position:sticky;left:0;z-index:1;background:#fff}
.tblwrap table thead th:first-child{z-index:3}
.panel.dark .tblwrap table thead th{background:#26331c}
.panel.dark .tblwrap table th:first-child,.panel.dark .tblwrap table td:first-child{background:#26331c}

/* Rules */
.rule-block{padding:12px 0;border-bottom:1px solid var(--bone-2)}
.rule-block:last-child{border:none}
.rule-block h3{font-family:'Archivo',sans-serif;font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}
.rule-block p,.rule-block li{font-size:13.5px;color:#2c3a32;line-height:1.55}
.rule-block ul{margin:6px 0 0 18px}
.chip-scale{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip-scale span{background:var(--green-soft);color:var(--brass-deep);font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;border:1px solid #d7e6c8}

/* Admin */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--sage);margin-bottom:5px;letter-spacing:.02em}
textarea,input,select{
  width:100%;background:var(--felt);border:1px solid var(--felt-line);color:var(--bone);
  border-radius:10px;padding:11px;font-family:'Inter';font-size:13px;
}
textarea{min-height:150px;resize:vertical;line-height:1.5;font-family:ui-monospace,'SF Mono',monospace;font-size:12px}
.btn{
  background:var(--brass-deep);color:#fff;border:none;border-radius:10px;
  padding:12px 18px;font-family:'Inter';font-weight:700;font-size:14px;cursor:pointer;
  transition:transform .1s ease,filter .16s ease;
}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--brass-deep);border:1px solid var(--brass)}
.panel.dark .btn.ghost{color:var(--brass);border-color:var(--brass)}
.btn.sm{padding:8px 12px;font-size:12px}
.btn.block{width:100%}
.row-flex{display:flex;gap:8px;flex-wrap:wrap}

/* WhatsApp output */
pre.wa{
  background:#0a1f18;border:1px solid var(--felt-line);border-radius:12px;padding:16px;
  color:#dfe9e2;font-family:ui-monospace,'SF Mono',monospace;font-size:12.5px;line-height:1.6;
  white-space:pre-wrap;word-break:break-word;
}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(4,14,10,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal-bg.show{display:flex}
.modal{background:var(--bone);color:var(--ink);border-radius:16px;padding:22px;max-width:400px;width:100%;box-shadow:var(--shadow)}
.modal h3{font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;margin-bottom:14px;letter-spacing:-.01em}
.modal label{color:var(--ink-soft)}
.modal input,.modal select{background:#fff;border:1px solid var(--bone-2);color:var(--ink)}

.foot{text-align:center;padding:28px 0 8px;color:#aab09f;font-size:12px}
.foot .suits{color:var(--brass);letter-spacing:.2em}
.foot .lock{display:inline-block;margin-top:12px;cursor:pointer;color:var(--brass-deep);
  font-weight:700;border:1px solid var(--brass);padding:7px 14px;border-radius:999px;background:#fff}
.foot .lock:hover{background:var(--green-soft)}
.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 8px}
.suit-h{color:var(--red)}
.hr{height:1px;background:var(--bone-2);margin:14px 0}
.panel.dark .hr{background:var(--felt-line)}
.pill-line{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--felt-line);font-size:13px}
.pill-line:last-child{border:none}
.pill-line b{font-variant-numeric:tabular-nums}
.tag-new{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.04em;vertical-align:middle}

/* Charts */
.chart-wrap{overflow-x:auto;margin:6px -6px 0}
svg.chart{width:100%;min-width:560px;height:auto;display:block}
.gridline{stroke:var(--line);stroke-width:1}
.panel.dark .gridline{stroke:var(--felt-line)}
.axis-lbl{font-family:'Inter';font-size:10px;fill:var(--ink-soft);font-weight:600}
.panel.dark .axis-lbl{fill:var(--sage)}
.legend{display:flex;flex-wrap:wrap;gap:7px 12px;margin-top:14px}
.legend .item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);cursor:pointer;font-weight:600;transition:opacity .14s}
.panel.dark .legend .item{color:var(--sage)}
.legend .item .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.legend .item.dim{opacity:.32}
.legend .item.hot{color:var(--ink)}
.panel.dark .legend .item.hot{color:#fff}
</style>
<!-- Firebase (SDK compat — funciona em arquivo único, sem build) -->

<script>
/* ============================================================
   SPoker — protótipo standalone (dados em memória)
   Convenções compatíveis com o padrão Firebase do Tarcísio:
   render por concatenação de string, sem template literal
   aninhado e sem optional chaining nos renders.

/* ---------- CONFIG ---------- */
var CONFIG = {

  start: '2026-07-19',

var CHURRASCO_PER_ETAPA = CONFIG.churrascoTotal / CONFIG.rounds; // 65,2174...

/* ---------- ELENCO PADRÃO (de-para login -> nome) — usado como seed / demo ---------- */
var DEFAULT_PLAYERS = [

/* ---------- ETAPAS REAIS (usadas no modo demo até o Firebase assumir) ----------

var PLAYERS = [];

/* ---------- HISTÓRICO REAL (extraído da planilha) ---------- */
var HIST_PODIUMS = [
  {s:'2020',          p:['Gustav\u00e3o','Diego','Guiga']},

  {s:'2026 \u00b7 1\u00ba Sem', p:['Tarcisio','Gustavob09','Alcides']}
];

/* ============================================================
   MOTOR DE CÁLCULO
   ============================================================ */
function buyinForEntries(n){
  var total=0;
  for(var i=0;i<n;i++){
    total += (i < CONFIG.buyinScale.length) ? CONFIG.buyinScale[i] : CONFIG.buyinBeyond;
  }
  return total;
}
function pointsForPos(pos){
  return CONFIG.pointsByPos[pos] || 0;
}
function money(v){
  var neg=v<0; v=Math.abs(v);
  var s=(Math.round(v*100)/100).toFixed(2);
  var parts=s.split('.'), intp=parts[0], dec=parts[1];
  intp=intp.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (neg?'-':'')+'R$\u00a0'+intp+','+dec;
}
function fmtInt(v){
  var neg=v<0; v=Math.abs(Math.round(v));
  var s=(''+v).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return (neg?'-':'')+s;
}
function pluralS(n,a,b){ return n===1 ? a : b; }

/* calcula os números financeiros de uma etapa */
function etapaFinance(etapa){
  var results = etapa.results;
  var pote=0, entriesTotal=0, playersCount=results.length;
  var i, r;
  for(i=0;i<results.length;i++){
    r=results[i];
    r.buyin = buyinForEntries(r.entries);
    r.points = pointsForPos(r.pos);
    pote += r.buyin;
    entriesTotal += r.entries;
  }
  var rebuys = entriesTotal - playersCount;
  var twenty = pote*0.20;
  var churrasco = Math.min(CHURRASCO_PER_ETAPA, twenty);
  var potePremio = Math.max(0, twenty - churrasco);
  var prize1 = pote*0.60;
  var prize2 = pote*0.20;
  // net de cada jogador
  for(i=0;i<results.length;i++){
    r=results[i];
    var prize=0;
    if(r.pos===1) prize=prize1;
    if(r.pos===2) prize=prize2;
    r.prize=prize;
    r.net = prize - r.buyin;
  }
  return {
    pote:pote, entriesTotal:entriesTotal, playersCount:playersCount, rebuys:rebuys,
    churrasco:churrasco, potePremio:potePremio, prize1:prize1, prize2:prize2,
    winner: byPos(results,1), second: byPos(results,2)
  };
}
function byPos(results,pos){
  for(var i=0;i<results.length;i++){ if(results[i].pos===pos) return results[i]; }
  return null;
}

/* ---------- AVULSAS: mesma mecânica de entradas, mas valor fixo (sem escalonar) e split 70/30 ---------- */
var AVULSA_ENTRY_COST=50;
function avulsaFinance(av){
  var results=av.results, pote=0, i, r;
  for(i=0;i<results.length;i++){
    r=results[i];
    r.buyin = r.entries * AVULSA_ENTRY_COST;
    pote += r.buyin;
  }
  var winner=byPos(results,1), second=byPos(results,2);
  var prize1=pote*0.7, prize2=pote*0.3;
  for(i=0;i<results.length;i++){
    r=results[i]; var prize=0;
    if(r.pos===1) prize=prize1;
    if(r.pos===2) prize=prize2;
    r.prize=prize; r.net=prize-r.buyin;
  }
  return {pote:pote, prize1:prize1, prize2:prize2, winner:winner, second:second, playersCount:results.length};
}
function avulsaPendingCount(av){
  var r=av.results, i, n=0;
  for(i=0;i<r.length;i++){ var pay=av.pay?av.pay[r[i].name]:null; if(!pay||!pay.paid) n++; }
  var f=avulsaFinance(av);
  if(f.winner && f.second){ var p2=av.pay?av.pay['_premio2_']:null; if(!p2||!p2.paid) n++; }
  return n;
}
function avulsaClosed(av){ return avulsaPendingCount(av)===0; }
function liveAvulsaPodium(){
  var tally={}, i, j;
  for(i=0;i<AVULSAS.length;i++){
    var res=AVULSAS[i].results.slice().sort(function(a,b){return a.pos-b.pos;});
    for(j=0;j<res.length;j++){
      if(res[j].pos>=1 && res[j].pos<=3){
        var nm=res[j].name;
        if(!tally[nm]) tally[nm]=[0,0,0];
        tally[nm][res[j].pos-1]++;
      }
    }
  }
  return tally;
}
function combinedAvulsaPodium(){
  // base genesis (planilha original, antes do app) + avulsas lançadas pelo app — soma segura, fontes não se sobrepõem
  var live=liveAvulsaPodium(), combined={}, i, k;
  for(i=0;i<HIST_STATS.length;i++){
    var s=HIST_STATS[i];
    if(s.a) combined[s.n]=[s.a[0],s.a[1],s.a[2]];
  }
  for(k in live){
    if(!combined[k]) combined[k]=[0,0,0];
    combined[k][0]+=live[k][0]; combined[k][1]+=live[k][1]; combined[k][2]+=live[k][2];
  }
  return combined;
}

/* ---------- PAGAMENTOS / PRAZO / MULTA ---------- */
var TODAY = (function(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); })();
function toDate(iso){ var p=iso.split('-'); return new Date(+p[0], (+p[1])-1, +p[2]); }
function addDays(iso,n){ var d=toDate(iso); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function daysBetween(isoA,isoB){ return Math.round((toDate(isoB)-toDate(isoA))/86400000); }
function etapaDeadline(etapa){ return addDays(etapa.date, 2); } /* domingo -> terça */
function playerPenalty(etapa, name){
  var pay = etapa.pay ? etapa.pay[name] : null;
  if(pay && pay.paid && pay.date){
    var late = daysBetween(etapaDeadline(etapa), pay.date);
    return late>0 ? late*5 : 0;
  }
  return 0; /* pendente ainda não penaliza — a multa entra quando o pagamento é registrado com data */
}
function pendingCount(etapa){
  var r=etapa.results, i, n=0;
  for(i=0;i<r.length;i++){ var pay=etapa.pay?etapa.pay[r[i].name]:null; if(!pay||!pay.paid) n++; }
  var f=etapaFinance(etapa);
  if(f.winner){ var pp=etapa.pay?etapa.pay['_pote_']:null; if(!pp||!pp.paid) n++; }
  if(f.second){ var p2=etapa.pay?etapa.pay['_premio2_']:null; if(!p2||!p2.paid) n++; }
  return n;
}
function etapaClosed(etapa){ return pendingCount(etapa)===0; }
function seedPayments(){
  var i, j;
  for(i=0;i<ETAPAS.length;i++){
    var e=ETAPAS[i];
    if(!e.pay) e.pay={};
    var dl=etapaDeadline(e);
    for(j=0;j<e.results.length;j++){
      var nm=e.results[j].name;
      if(e.pay[nm]===undefined) e.pay[nm]={paid:true, date:dl}; /* pago no prazo por padrão */
    }
  }
  if(ETAPAS[4]) ETAPAS[4].pay['Gustav\u00e3o']={paid:true, date:addDays(ETAPAS[4].date,4)}; /* 2 dias após a terça -> -10 */
  if(ETAPAS[5]){ ETAPAS[5].pay['Zizi']={paid:false,date:null}; ETAPAS[5].pay['Profeta']={paid:false,date:null}; }
}
function paySource(kind){ return kind==='avulsa' ? AVULSAS : ETAPAS; }
function payCollection(kind){ return kind==='avulsa' ? 'avulsas' : 'etapas'; }
function persistPay(kind, item){
  if(!DEMO_MODE && item._id){
    db.collection(payCollection(kind)).doc(item._id).update({pay:item.pay}).catch(function(err){ alert('Erro ao salvar pagamento: '+err.message); });
  }
}
function openPayModal(kind, idx, key, label){
  var item=paySource(kind)[idx];
  var pay=item.pay?item.pay[key]:null;
  var curDate=(pay&&pay.paid)?pay.date:TODAY;
  var h='<h3>&#128179; '+label+'</h3>';
  h+='<div class="field"><label>Data do pagamento</label><input id="pmDate" type="date" value="'+curDate+'"></div>';
  h+='<div class="row-flex"><button class="btn" onclick="confirmPayModal(\''+kind+'\','+idx+',\''+key.replace(/'/g,"\\'")+'\')">Confirmar pago</button>';
  if(pay && pay.paid) h+='<button class="btn ghost" onclick="undoPayModal(\''+kind+'\','+idx+',\''+key.replace(/'/g,"\\'")+'\')">Desfazer</button>';
  h+='<button class="btn ghost" onclick="closeModal()">Cancelar</button></div>';
  openModal(h);
}
function confirmPayModal(kind, idx, key){
  var d=document.getElementById('pmDate').value;
  if(!d){ alert('Escolha uma data.'); return; }
  var item=paySource(kind)[idx]; if(!item.pay) item.pay={};
  item.pay[key]={paid:true, date:d};
  persistPay(kind, item);
  closeModal(); render();
}
function undoPayModal(kind, idx, key){
  var item=paySource(kind)[idx]; if(!item.pay) item.pay={};
  item.pay[key]={paid:false, date:null};
  persistPay(kind, item);
  closeModal(); render();
}
function payActionCell(kind, idx, key, paid, label){

}

/* classificação acumulada da temporada (limit = nº de etapas a considerar) */
function classification(limit, srcEtapas){
  var src = srcEtapas || ETAPAS;
  var LN = (limit===undefined || limit>src.length) ? src.length : limit;
  var map={}, i, e, r, k;
  for(i=0;i<PLAYERS.length;i++){
    map[PLAYERS[i].name]={name:PLAYERS[i].name, scores:[], total:0, games:0,
                          invest:0, ganho:0, ganhoEtapas:0, wins:0, penalty:0};
  }
  for(i=0;i<LN;i++){
    e=src[i]; etapaFinance(e);
    for(var j=0;j<e.results.length;j++){
      r=e.results[j];
      var p=map[r.name];
      if(!p){ p={name:r.name,scores:[],total:0,games:0,invest:0,ganho:0,ganhoEtapas:0,wins:0,penalty:0}; map[r.name]=p; }
      p.scores.push(r.points);
      p.games++;
      p.invest += r.buyin;
      p.ganho += r.net;
      p.ganhoEtapas += r.prize;
      if(r.pos===1) p.wins++;
      p.penalty += playerPenalty(e, r.name);
    }
  }
  var arr=[];
  for(k in map){
    var pl=map[k];
    var sum=0, s;
    for(s=0;s<pl.scores.length;s++) sum+=pl.scores[s];
    // descarte dos 3 piores (só quando houver mais jogos que o descarte)
    var discarded=0, sorted=pl.scores.slice().sort(function(a,b){return a-b;});
    if(pl.scores.length > CONFIG.discardWorst){
      for(s=0;s<CONFIG.discardWorst;s++) discarded+=sorted[s];
    }
    pl.gross=sum;
    pl.discarded=discarded;
    pl.total=sum - discarded - pl.penalty;
    arr.push(pl);
  }
  arr.sort(function(a,b){ return b.total-a.total || b.wins-a.wins; });
  return arr;
}

/* soma acumulada do pote de premiação (só o pote campeonato) e do churrasco */
function seasonPots(){
  var premio=0, churr=0, arrec=0, i;
  for(i=0;i<ETAPAS.length;i++){
    var f=etapaFinance(ETAPAS[i]);
    premio+=f.potePremio; churr+=f.churrasco; arrec+=f.pote;
  }
  return {premio:premio, churrasco:churr, arrecadado:arrec};
}

/* ============================================================
   PARSER DO POKERSTARS
   ============================================================ */
function parsePokerStars(text){
  var lines=text.split('\n');
  var entriesByLogin={}, bestPosByLogin={}, order=[], i;
  var re=/^\s*(\d+):\s*(.+?)\s*\(([^)]*)\)/; // pos: nome (país)
  for(i=0;i<lines.length;i++){
    var m=re.exec(lines[i]);
    if(!m) continue;
    var pos=parseInt(m[1],10);
    var raw=m[2];
    // remove sufixo [n] de rebuy
    var base=raw.replace(/\s*\[\d+\]\s*$/,'').trim();
    if(!base) continue;
    if(entriesByLogin[base]===undefined){ entriesByLogin[base]=0; bestPosByLogin[base]=pos; order.push(base); }
    entriesByLogin[base]++;
    if(pos < bestPosByLogin[base]) bestPosByLogin[base]=pos;
  }
  // ordena por melhor posição
  order.sort(function(a,b){ return bestPosByLogin[a]-bestPosByLogin[b]; });
  var out=[];
  for(i=0;i<order.length;i++){
    var login=order[i];
    out.push({
      login:login,
      name:nameForLogin(login),
      entries:entriesByLogin[login],
      pos:bestPosByLogin[login],
      known:!!findByLogin(login)
    });
  }
  return out;
}
function findByLogin(login){
  for(var i=0;i<PLAYERS.length;i++){ if(PLAYERS[i].login && PLAYERS[i].login.toLowerCase()===login.toLowerCase()) return PLAYERS[i]; }
  return null;
}
function nameForLogin(login){
  var p=findByLogin(login);
  return p ? p.name : login;
}

function whatsappText(etapa){
  var f=etapaFinance(etapa);
  var L=[];
  var etapaNum = ('0'+etapa.n).slice(-2);
  L.push('*'+etapaNum+' ETAPA - 2026 - 2\u00ba SEMESTRE*');
  L.push('Total arrecadado: '+money(f.pote));
  L.push('');
  if(f.winner){
    L.push(f.winner.name+' ganhou e tem que enviar '+money(f.prize2)+' para o pote (sendo '+money(f.potePremio)+' pr\u00eamio + '+money(f.churrasco)+' churrasco)');
  }
  if(f.second){
    var net2 = f.second.net; // já é prize2 − buyin do 2º (calculado em etapaFinance)
    var cac = f.second.entries;
    if(net2>=0){
      L.push(f.second.name+' ficou em segundo, deveria receber '+money(f.prize2)+' mas como pegou '+cac+' '+pluralS(cac,'cacife','cacifes')+' tem que receber '+money(net2));
    } else {
      L.push(f.second.name+' ficou em segundo, mas como pegou '+cac+' '+pluralS(cac,'cacife','cacifes')+' (mais que o pr\u00eamio de '+money(f.prize2)+'), precisa pagar '+money(-net2)+' ao '+f.winner.name);
    }
  }
  L.push('');
  L.push(f.playersCount+' inscritos e '+f.rebuys+' re-buys');
  L.push('');
  var i, r;
  for(i=0;i<etapa.results.length;i++){
    r=etapa.results[i];
    L.push(r.name+'\t'+money(r.buyin).replace('R$ ','R$'));
  }
  L.push('');
  // PIX dos premiados (placeholder — vem da aba de PIX)
  L.push('PIX: '+(f.winner?f.winner.name:'')+': tarcisiogb@gmail.com');
  L.push('Pote: tarcisiogb@gmail.com');
  return L.join('\n');
}

  var n=document.getElementById('nav');
  var h='', i;
  for(i=0;i<TABS.length;i++){
    var on = STATE.tab===TABS[i].id ? ' on' : '';
    h += '<button class="'+on.trim()+'" onclick="go(\''+TABS[i].id+'\')">'+TABS[i].label+'</button>';
  }
  if(STATE.isAdmin){
    var onA = STATE.tab==='admin' ? ' on' : '';
    h += '<button class="admin-tab'+onA+'" onclick="go(\'admin\')">&#9827; Admin</button>';
  }
  n.innerHTML=h;
}

function go(tab){ STATE.tab=tab; render(); window.scrollTo(0,0); }

function render(){
  document.getElementById('hDates').innerHTML = fmtDate(CONFIG.start)+' &rarr; '+fmtDate(CONFIG.end);
  renderNav();
  var v=document.getElementById('view'), h='';
  if(STATE.tab==='class') h=viewClass();
  else if(STATE.tab==='graficos') h=viewGraficos();
  else if(STATE.tab==='tesouraria') h=viewTesouraria();
  else if(STATE.tab==='pagamentos') h=viewPagamentos();
  else if(STATE.tab==='avulsas') h=viewAvulsas();
  else if(STATE.tab==='regras') h=viewRegras();
  else if(STATE.tab==='insights') h=viewInsights();
  else if(STATE.tab==='historico') h=viewHistorico();
  else if(STATE.tab==='admin') h=viewAdmin();
  var banner = (typeof DEMO_MODE!=='undefined' && DEMO_MODE) ? '<div class="demo-banner">&#9888;&#65039; Modo demonstra\u00e7\u00e3o &mdash; dados de exemplo. Configure o Firebase para usar de verdade.</div>' : '';
  v.innerHTML=banner+h;
}

/* ---- Classificação ---- */
function rankMap(limit){
  var arr=classification(limit).filter(function(p){return p.games>0;});
  var m={}, i; for(i=0;i<arr.length;i++) m[arr[i].name]=i+1;
  return m;
}
function activeNamesSet(){
  var set={}, i;
  for(i=0;i<PLAYERS.length;i++){ if(PLAYERS[i].active!==false) set[PLAYERS[i].name]=true; }
  return set;
}
function viewClass(){
  var actSet=activeNamesSet();
  var arr=classification().filter(function(p){return p.games>0 || actSet[p.name];});
  arr.sort(function(a,b){ return b.total-a.total || b.wins-a.wins; });
  var prev = ETAPAS.length>1 ? rankMap(ETAPAS.length-1) : {};
  var etapasDone=ETAPAS.length;
  var h='', i;
  h+='<div class="panel">';
  h+='<div class="eyebrow">Classifica\u00e7\u00e3o geral</div>';
  h+='<h2>Pontos corridos</h2>';
  h+='<div class="muted" style="margin:-8px 0 14px">'+etapasDone+' de '+CONFIG.rounds+' etapas &middot; definitivo = bruto \u2212 3 piores \u2212 atrasos</div>';
  if(arr.length===0){
    var tip = (typeof DEMO_MODE!=='undefined' && !DEMO_MODE) ? ' O organizador ainda n\u00e3o lan\u00e7ou/semeou nenhuma etapa no banco.' : '';
    h+='<div class="empty">Nenhuma etapa lan\u00e7ada ainda.'+tip+'</div></div>';
    return h;
  }
  for(i=0;i<arr.length;i++){
    var p=arr[i], pos=i+1;
    var cls='lb-row'+(pos<=3 && p.games>0?' p'+pos:'');
    var mv;
    if(p.games===0){ mv='<span class="mv eq">&middot;</span>'; }
    else if(prev[p.name]){
      var d=prev[p.name]-pos;
      if(d>0) mv='<span class="mv up">&#9650;'+d+'</span>';
      else if(d<0) mv='<span class="mv down">&#9660;'+(-d)+'</span>';
      else mv='<span class="mv eq">&ndash;</span>';
    } else { mv='<span class="mv new">novo</span>'; }
    h+='<div class="'+cls+'">';
    h+='<div class="lb-rank">'+pos+'<div class="mv-wrap">'+mv+'</div></div>';
    h+='<div><div class="lb-name">'+p.name+(pos===1 && p.games>0?' <span class="badge">L\u00cdDER</span>':'')+'</div>';
    if(p.games===0){
      h+='<div class="lb-sub">ainda n\u00e3o estreou</div></div>';
    } else {
      h+='<div class="lb-sub">'+p.games+' '+pluralS(p.games,'jogo','jogos')+' &middot; '+p.wins+' '+pluralS(p.wins,'vit\u00f3ria','vit\u00f3rias')+'</div>';
      var brk='<span class="brk">'+p.gross+' brutos</span>';
      if(p.discarded>0) brk+='<span class="brk minus">\u2212'+p.discarded+' (3 piores)</span>';
      if(p.penalty>0) brk+='<span class="brk minus">\u2212'+p.penalty+' (atraso)</span>';
      h+='<div class="lb-brk">'+brk+'</div></div>';
    }
    h+='<div class="lb-pts tabnum">'+p.total+'<small>definitivos</small></div>';
    h+='</div>';
  }
  h+='</div>';

  // grade de evolução (centralizada, com datas)
  h+='<div class="panel dark">';
  h+='<div class="eyebrow">Pontos por etapa</div>';
  h+='<h2 style="color:var(--bone)">Evolu\u00e7\u00e3o</h2>';
  h+='<div class="tblwrap"><table><thead><tr><th>Jogador</th>';
  var e;
  for(e=0;e<ETAPAS.length;e++) h+='<th class="ctr">'+fmtDateShort(ETAPAS[e].date)+'</th>';
  h+='<th class="ctr">Total</th></tr></thead><tbody>';
  for(i=0;i<arr.length;i++){
    var pl=arr[i];
    h+='<tr><td>'+pl.name+'</td>';
    for(e=0;e<ETAPAS.length;e++){
      var val=scoreInEtapa(ETAPAS[e],pl.name);
      h+='<td class="ctr">'+(val===null?'&middot;':val)+'</td>';
    }
    h+='<td class="ctr"><b>'+pl.total+'</b></td></tr>';
  }
  h+='</tbody></table></div></div>';
  return h;
}
function scoreInEtapa(etapa,name){
  for(var i=0;i<etapa.results.length;i++){ if(etapa.results[i].name===name) return pointsForPos(etapa.results[i].pos); }
  return null;
}

/* ---- Tesouraria ---- */
function viewTesouraria(){
  var pots=seasonPots();
  var arr=classification().filter(function(p){return p.games>0;});
  var churrPct=Math.min(100, (pots.churrasco/CONFIG.churrascoTotal)*100);
  var h='';
  h+='<div class="panel dark">';
  h+='<div class="eyebrow">Tesouraria da temporada</div>';
  h+='<h2 style="color:var(--bone)">Os potes</h2>';
  h+='<div class="stats">';
  h+='<div class="stat"><div class="k">Pote campeonato</div><div class="v brass">'+money(pots.premio)+'</div></div>';
  h+='<div class="stat"><div class="k">Vaquinha churrasco</div><div class="v">'+money(pots.churrasco)+'</div></div>';
  h+='<div class="stat"><div class="k">Arrecadado (total)</div><div class="v">'+money(pots.arrecadado)+'</div></div>';
  h+='<div class="stat"><div class="k">Etapas</div><div class="v">'+ETAPAS.length+'<span style="font-size:14px;color:var(--sage)">/'+CONFIG.rounds+'</span></div></div>';
  h+='</div>';
  h+='<div class="hr"></div>';
  h+='<div class="eyebrow">Churrasco &middot; '+money(CHURRASCO_PER_ETAPA)+' por etapa</div>';
  h+='<div class="prog"><i style="width:'+churrPct+'%"></i></div>';
  h+='<div class="muted">'+money(pots.churrasco)+' de '+money(CONFIG.churrascoTotal)+' &middot; acumula 1/23 a cada domingo</div>';
  h+='</div>';

  // prévia premiação final
  h+='<div class="panel">';
  h+='<div class="eyebrow">Se a temporada acabasse hoje</div>';
  h+='<h2>Pr\u00e9via da premia\u00e7\u00e3o</h2>';
  var i, ks=[1,2,3,4,5,6,7,8];
  for(i=0;i<ks.length;i++){
    var pos=ks[i];
    var val=pots.premio*CONFIG.finalSplit[pos];
    var who = arr[pos-1] ? arr[pos-1].name : '&mdash;';
    h+='<div class="pill-line"><span><b style="color:var(--brass-deep)">'+pos+'\u00ba</b> &nbsp;'+who+' <span class="muted">('+(CONFIG.finalSplit[pos]*100)+'%)</span></span><b>'+money(val)+'</b></div>';
  }
  h+='</div>';

  // ganho efetivo
  var pmap={};
  for(i=0;i<arr.length && i<8;i++){ pmap[arr[i].name]=pots.premio*CONFIG.finalSplit[i+1]; }
  h+='<div class="panel">';
  h+='<div class="eyebrow">Ganho efetivo na temporada</div>';
  h+='<h2>Est\u00e1 no lucro ou no preju\u00edzo?</h2>';
  var rows=arr.slice(), rr;
  for(i=0;i<rows.length;i++){ var pv=pmap[rows[i].name]?pmap[rows[i].name]:0; rows[i]._prev=pv; rows[i]._efet=rows[i].ganhoEtapas - rows[i].invest + pv; }
  rows.sort(function(a,b){ return b._efet-a._efet; });
  h+='<div class="tblwrap"><table><thead><tr><th>Jogador</th><th class="ctr">Investido</th><th class="ctr">Ganho etapas</th><th class="ctr">Premia\u00e7\u00e3o*</th><th class="ctr">Efetivo</th></tr></thead><tbody>';
  for(i=0;i<rows.length;i++){
    rr=rows[i];
    var col=rr._efet>=0?'color:#1f7a4d':'color:var(--red)';
    var sign=rr._efet>=0?'+':'';
    var prevCell = rr._prev>0 ? money(rr._prev) : '<span class="muted">&mdash;</span>';
    h+='<tr><td>'+rr.name+'</td><td class="ctr">'+money(rr.invest)+'</td><td class="ctr">'+money(rr.ganhoEtapas)+'</td><td class="ctr">'+prevCell+'</td><td class="ctr" style="'+col+';font-weight:700">'+sign+money(rr._efet)+'</td></tr>';
  }
  h+='</tbody></table></div>';
  h+='<div class="muted" style="margin-top:8px">Efetivo = ganho das etapas + pr\u00eamio \u2212 investido. *Premia\u00e7\u00e3o = pr\u00e9via do campeonato se a temporada acabasse hoje.</div>';
  h+='</div>';
  return h;
}

/* ---- Pagamentos ---- */
function viewPagamentos(){
  var i, j, closed=0, open=0;
  for(i=0;i<ETAPAS.length;i++){ if(etapaClosed(ETAPAS[i])) closed++; else open++; }
  var h='';
  h+='<div class="panel dark">';
  h+='<div class="eyebrow">Controle de pagamentos</div><h2 style="color:var(--bone)">Fechamento das etapas</h2>';
  h+='<div class="muted" style="margin:-8px 0 12px">Prazo: ter\u00e7a-feira seguinte \u00e0 etapa. Cada dia de atraso tira <b style="color:#e0968b">5 pontos</b> do jogador.</div>';
  h+='<div class="muted" style="margin-bottom:12px">O <b>1\u00ba colocado</b> fica com o pote da noite e \u00e9 respons\u00e1vel por repassar o churrasco + pote campeonato (20%) e o pr\u00eamio do <b>2\u00ba colocado</b> \u2014 mesmo antes de receber dos demais jogadores.</div>';
  h+='<div class="stats">';
  h+='<div class="stat"><div class="k">Etapas fechadas</div><div class="v brass">'+closed+'</div></div>';
  h+='<div class="stat"><div class="k">Em aberto</div><div class="v'+(open>0?' red':'')+'">'+open+'</div></div>';
  h+='</div>';
  if(!STATE.isAdmin) h+='<div class="muted" style="margin-top:12px">Entre como organizador (cadeado no rodap\u00e9) para marcar quem j\u00e1 pagou.</div>';
  h+='</div>';

  for(i=ETAPAS.length-1;i>=0;i--){
    var e=ETAPAS[i];
    var f=etapaFinance(e);
    var pend=pendingCount(e), closedE=(pend===0), dl=etapaDeadline(e);
    h+='<div class="panel">';
    h+='<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap">';
    h+='<h2 style="margin-bottom:2px">Etapa '+e.n+' <span class="muted" style="font-size:13px;font-weight:500">'+fmtDate(e.date)+'</span></h2>';
    if(closedE) h+='<span class="badge">FECHADA</span>';
    else h+='<span class="badge" style="background:var(--red);color:#fff">'+pend+' PENDENTE'+(pend>1?'S':'')+'</span>';
    h+='</div>';
    h+='<div class="muted" style="margin-bottom:10px">Prazo de pagamento: '+fmtDate(dl)+'</div>';
    if(f.winner || f.second){
      h+='<div class="tblwrap"><table><thead><tr><th>Respons\u00e1vel</th><th class="ctr">Refere-se a</th><th class="ctr">Valor</th><th class="ctr">Status</th>'+(STATE.isAdmin?'<th></th>':'')+'</tr></thead><tbody>';
      if(f.winner){
        var payPote=e.pay?e.pay['_pote_']:null, paidPote=payPote&&payPote.paid;
        var stPote = paidPote ? '<span style="color:#1f7a4d;font-weight:600">Pago '+fmtDateShort(payPote.date)+'</span>' : '<span style="color:var(--red);font-weight:600">Pendente</span>';
        h+='<tr><td>&#129351; '+f.winner.name+'</td><td class="ctr">Pote (churrasco + campeonato)</td><td class="ctr">'+money(f.churrasco+f.potePremio)+'</td><td class="ctr">'+stPote+'</td>';
        if(STATE.isAdmin) h+=payActionCell('etapa',i,'_pote_',paidPote,'Pote: '+f.winner.name);
        h+='</tr>';
      }
      if(f.winner && f.second){
        var net2v=f.second.net;
        var payP2=e.pay?e.pay['_premio2_']:null, paidP2=payP2&&payP2.paid;
        var stP2 = paidP2 ? '<span style="color:#1f7a4d;font-weight:600">Pago '+fmtDateShort(payP2.date)+'</span>' : '<span style="color:var(--red);font-weight:600">Pendente</span>';
        if(net2v>=0){
          h+='<tr><td>&#129351; '+f.winner.name+' \u2192 '+f.second.name+'</td><td class="ctr">Pr\u00eamio do 2\u00ba colocado (j\u00e1 descontado o buy-in)</td><td class="ctr">'+money(net2v)+'</td><td class="ctr">'+stP2+'</td>';
        } else {
          h+='<tr><td>&#129352; '+f.second.name+' \u2192 '+f.winner.name+'</td><td class="ctr">2\u00ba pegou mais cacife que o pr\u00eamio &mdash; paga a diferen\u00e7a</td><td class="ctr">'+money(-net2v)+'</td><td class="ctr">'+stP2+'</td>';
        }
        if(STATE.isAdmin) h+=payActionCell('etapa',i,'_premio2_',paidP2,'Pr\u00eamio do 2\u00ba: '+f.second.name);
        h+='</tr>';
      }
      h+='</tbody></table></div>';
      h+='<div class="muted" style="margin:8px 0 12px">O 1\u00ba colocado fica com o pote da noite e \u00e9 respons\u00e1vel por repassar os 20% (churrasco + pote campeonato) e o pr\u00eamio do 2\u00ba \u2014 mesmo antes de receber dos demais.</div>';
    }
    h+='<div class="tblwrap"><table><thead><tr><th>Jogador</th><th class="ctr">Deve</th><th class="ctr">Status</th><th class="ctr">Multa</th>'+(STATE.isAdmin?'<th></th>':'')+'</tr></thead><tbody>';
    for(j=0;j<e.results.length;j++){
      var r=e.results[j];
      var pay=e.pay?e.pay[r.name]:null, paid=pay&&pay.paid, pen=playerPenalty(e,r.name);
      var statusHtml = paid
        ? '<span style="color:#1f7a4d;font-weight:600">Pago '+fmtDateShort(pay.date)+'</span>'
        : '<span style="color:var(--red);font-weight:600">Pendente</span>';
      var penHtml = pen>0 ? '<span style="color:var(--red);font-weight:700">-'+pen+' pts</span>' : '<span class="muted">&mdash;</span>';
      h+='<tr><td>'+r.name+'</td><td class="ctr">'+money(r.buyin)+'</td><td class="ctr">'+statusHtml+'</td><td class="ctr">'+penHtml+'</td>';
      if(STATE.isAdmin){
        h+=payActionCell('etapa',i,r.name,paid,'Pagamento de '+r.name);
      }
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    h+='</div>';
  }
  return h;
}

var CHART_COLORS=['#3b6fd4','#c0392b','#556d36','#e0a423','#e0662b','#1aa39a',
  '#8a63d2','#b5892b','#4e9a4e','#d15a8f','#2f8fb0','#87a85f','#a0522d','#e08a3c',
  '#6bbf6b','#c95d5a','#5b7fe0','#7fbf3f','#c9a13b','#3fb0a8'];

function seasonSeries(){
  var N=ETAPAS.length, i, j;
  var order=[], seen={};
  for(i=0;i<N;i++){
    var res=ETAPAS[i].results;
    for(j=0;j<res.length;j++){
      var nm=res[j].name;
      if(!seen[nm]){ seen[nm]=true; order.push(nm); }
    }
  }
  var running={}, cum={};
  for(i=0;i<order.length;i++){ running[order[i]]=0; cum[order[i]]=[]; }
  for(i=0;i<N;i++){
    var got={};
    var r=ETAPAS[i].results;
    for(j=0;j<r.length;j++) got[r[j].name]=pointsForPos(r[j].pos);
    for(j=0;j<order.length;j++){
      var name=order[j];
      running[name]+= got[name]?got[name]:0;
      cum[name].push(running[name]);
    }
  }
  var series=[];
  for(i=0;i<order.length;i++){
    series.push({ name:order[i], color:CHART_COLORS[i%CHART_COLORS.length],
                  values:cum[order[i]], final:cum[order[i]][N-1] });
  }
  series.sort(function(a,b){ return b.final-a.final; });
  return {series:series, N:N};
}

function bumpRanks(series,N){
  var ranks={}, i, k;
  for(i=0;i<series.length;i++) ranks[series[i].name]=[];
  for(i=0;i<N;i++){
    var arr=series.slice().sort(function(a,b){ return b.values[i]-a.values[i]; });
    for(k=0;k<arr.length;k++) ranks[arr[k].name].push(k+1);
  }
  return ranks;
}

/* emite uma linha (polyline + pontos) */
function emitLine(pts, color, hot, dim){
  var d='', i, w = hot?3.4:2, op = dim?0.28:1, r = hot?3.6:2.6;
  for(i=0;i<pts.length;i++) d += (i===0?'M':'L')+pts[i].x.toFixed(1)+' '+pts[i].y.toFixed(1)+' ';
  var s='<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="'+w+'" stroke-linejoin="round" stroke-linecap="round" opacity="'+op+'"/>';
  for(i=0;i<pts.length;i++) s+='<circle cx="'+pts[i].x.toFixed(1)+'" cy="'+pts[i].y.toFixed(1)+'" r="'+r+'" fill="'+color+'" opacity="'+op+'"/>';
  return s;
}

function buildPointsChart(data){
  var series=data.series, N=data.N;
  var W=760, H=360, padL=36, padR=14, padT=14, padB=24;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var maxY=0, i, j;
  for(i=0;i<series.length;i++) if(series[i].final>maxY) maxY=series[i].final;
  var step = maxY>240?100:(maxY>120?50:25);
  var top = Math.ceil(maxY/step)*step; if(top===0) top=step;
  function X(idx){ return padL + (N<=1?plotW/2:(idx*(plotW/(N-1)))); }
  function Y(v){ return padT + plotH - (v/top)*plotH; }
  var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  var t;
  for(t=0;t<=top;t+=step){
    var y=Y(t);
    svg+='<line class="gridline" x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'"/>';
    svg+='<text class="axis-lbl" x="'+(padL-6)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end">'+t+'</text>';
  }
  for(i=0;i<N;i++) svg+='<text class="axis-lbl" x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle">'+fmtDateShort(ETAPAS[i].date)+'</text>';
  var hi=STATE.highlight;
  for(i=0;i<series.length;i++){
    var s=series[i], pts=[];
    for(j=0;j<s.values.length;j++) pts.push({x:X(j),y:Y(s.values[j])});
    var hot = hi && hi===s.name;
    var dim = hi && hi!==s.name;
    svg+=emitLine(pts, s.color, hot, dim);
  }
  svg+='</svg>';
  return svg;
}

function buildBumpChart(series){
  var N=ETAPAS.length, K=series.length;
  var W=760, H=Math.max(220, 40+K*26), padL=30, padR=14, padT=16, padB=24;
  var plotW=W-padL-padR, plotH=H-padT-padB;
  var ranks=bumpRanks(seasonSeries().series, N); // ranks entre todos
  function X(idx){ return padL + (N<=1?plotW/2:(idx*(plotW/(N-1)))); }
  function Y(rank){ return padT + (K<=1?plotH/2:((rank-1)/(K-1))*plotH); }
  var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  var k;
  for(k=1;k<=K;k++){
    var y=Y(k);
    svg+='<line class="gridline" x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" opacity="0.5"/>';
    svg+='<text class="axis-lbl" x="'+(padL-6)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end">'+k+'\u00ba</text>';
  }
  var i;
  for(i=0;i<N;i++) svg+='<text class="axis-lbl" x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle">'+fmtDateShort(ETAPAS[i].date)+'</text>';
  var hi=STATE.highlight, j;
  for(i=0;i<series.length;i++){
    var s=series[i], rk=ranks[s.name], pts=[];
    for(j=0;j<rk.length;j++){ if(rk[j]<=K) pts.push({x:X(j),y:Y(rk[j])}); else pts.push({x:X(j),y:Y(K)}); }
    var hot=hi && hi===s.name, dim=hi && hi!==s.name;
    svg+=emitLine(pts, s.color, hot, dim);
  }
  svg+='</svg>';
  return svg;
}

function legendHtml(series){
  var h='<div class="legend">', i, hi=STATE.highlight;
  for(i=0;i<series.length;i++){
    var s=series[i];
    var cls='item'+(hi&&hi===s.name?' hot':'')+(hi&&hi!==s.name?' dim':'');
    h+='<span class="'+cls+'" onclick="toggleHi(\''+s.name.replace(/'/g,"\\'")+'\')"><span class="sw" style="background:'+s.color+'"></span>'+s.name+'</span>';
  }
  h+='</div>';
  return h;
}
function toggleHi(name){ STATE.highlight = (STATE.highlight===name)?null:name; render(); }

  h+='</div>';

/* ============================================================
   CÁLCULO UNIFICADO DE CURIOSIDADES — SEMPRE AO VIVO
   Junta genesis (planilha original, 244 etapas) + temporadas
   arquivadas + temporada atual num único pool cronológico e
   recalcula tudo do zero. Nunca soma/mescla números já prontos
   — elimina risco de contar etapa duas vezes.
   ============================================================ */
/* ordem cronológica dos semestres que existem só na planilha original (pré-app) */
var GENESIS_SEASON_ORDER=['2020','2021 1 Sem','2021 2 Sem','2022 1 Sem','2022 2 Sem',
  '2023 1 Sem','2023 2 Sem','2024 1 Sem','2024 2 Sem','2025 1 Sem','2025 2 Sem','2026 1 Sem'];
/* lista mestra, cronológica: cada temporada que já existiu, do genesis até a atual */
function masterSeasonList(){
  var list=[], i;
  for(i=0;i<GENESIS_SEASON_ORDER.length;i++) list.push({key:GENESIS_SEASON_ORDER[i], label:GENESIS_SEASON_ORDER[i]});
  for(i=0;i<SEASONS_LIST.length;i++) list.push({key:SEASONS_LIST[i]._id, label:SEASONS_LIST[i].name});
  list.push({key:CONFIG.seasonName, label:CONFIG.seasonName+' (atual)'});
  return list;
}
function allSeasonKeys(){
  var list=masterSeasonList(), i, keys=[];
  for(i=0;i<list.length;i++) keys.push(list[i].key);
  return keys;
}
function selectedSeasonKeys(){
  return STATE.histSeasons || allSeasonKeys();
}
function toggleHistSeason(key){
  var cur=selectedSeasonKeys().slice();
  var idx=cur.indexOf(key);
  if(idx>=0) cur.splice(idx,1); else cur.push(key);

function applySeasonRange(){
  var list=masterSeasonList();
  var fromEl=document.getElementById('rangeFrom'), toEl=document.getElementById('rangeTo');
  var fromIdx=0, toIdx=list.length-1, i;
  for(i=0;i<list.length;i++){ if(list[i].key===fromEl.value) fromIdx=i; if(list[i].key===toEl.value) toIdx=i; }
  if(fromIdx>toIdx){ var tmp=fromIdx; fromIdx=toIdx; toIdx=tmp; }
  var keys=[];
  for(i=fromIdx;i<=toIdx;i++) keys.push(list[i].key);
  STATE.histSeasons=keys;
  render();
}
function buildFullEtapaPool(selectedKeys){
  if(selectedKeys===undefined) selectedKeys=allSeasonKeys();
  else if(typeof selectedKeys==='string') selectedKeys=[selectedKeys]; // compat com chamadas antigas ('current')
  var pool=[], i;
  for(i=0;i<GENESIS_ETAPAS.length;i++){ if(selectedKeys.indexOf(GENESIS_ETAPAS[i].season)>=0) pool.push(GENESIS_ETAPAS[i]); }
  for(i=0;i<ARCHIVED_ETAPAS.length;i++){
    if(selectedKeys.indexOf(ARCHIVED_ETAPAS[i].season)>=0) pool.push({season:ARCHIVED_ETAPAS[i].season, results:ARCHIVED_ETAPAS[i].results});
  }
  if(selectedKeys.indexOf(CONFIG.seasonName)>=0) for(i=0;i<ETAPAS.length;i++) pool.push({season:CONFIG.seasonName, results:ETAPAS[i].results});
  return pool;
}

function computeLiveCuriosities(pool, minGames){
  if(minGames===undefined) minGames=20;
  var plays={}, wins={}, timeline={}, finals={}, vice={}, matchupRec={}, firstIdx={}, podiumTally={};
  var i, j;
  for(i=0;i<pool.length;i++){
    var res=pool[i].results;
    if(!res || res.length===0) continue;
    var sorted=res.slice().sort(function(a,b){return a.pos-b.pos;});
    var winner=null, second=null;
    for(j=0;j<sorted.length;j++){
      var nm0=sorted[j].name;
      if(firstIdx[nm0]===undefined) firstIdx[nm0]=i;
      if(sorted[j].pos===1) winner=nm0;
      if(sorted[j].pos===2) second=nm0;
      if(sorted[j].pos>=1 && sorted[j].pos<=3){
        if(!podiumTally[nm0]) podiumTally[nm0]=[0,0,0];
        podiumTally[nm0][sorted[j].pos-1]++;
      }
    }
    for(j=0;j<res.length;j++){
      var nm=res[j].name;
      plays[nm]=(plays[nm]||0)+1;
      var won=(nm===winner);
      if(won) wins[nm]=(wins[nm]||0)+1;
      if(!timeline[nm]) timeline[nm]=[];
      timeline[nm].push(won);
    }
    if(winner){ finals[winner]=(finals[winner]||0)+1; }
    if(second){ finals[second]=(finals[second]||0)+1; vice[second]=(vice[second]||0)+1; }
    if(winner && second){
      var pair=[winner,second].sort();
      var key=pair[0]+'|'+pair[1];
      if(!matchupRec[key]) matchupRec[key]={a:pair[0],b:pair[1],na:0,nb:0,n:0};
      matchupRec[key].n++;
      if(winner===matchupRec[key].a) matchupRec[key].na++; else matchupRec[key].nb++;
    }
  }
  function longestStreak(arr){ var best=0,cur=0,k; for(k=0;k<arr.length;k++){ if(arr[k]){cur++; if(cur>best)best=cur;} else cur=0; } return best; }
  var k, streaks=[], winrate=[], matchups=[], finalsArr=[], viceArr=[];
  for(k in timeline) streaks.push({n:k, v:longestStreak(timeline[k])});
  streaks.sort(function(a,b){return b.v-a.v;});
  for(k in plays){ if(plays[k]>=minGames) winrate.push({n:k, w:wins[k]||0, p:plays[k], pct:Math.round((wins[k]||0)/plays[k]*1000)/10}); }
  winrate.sort(function(a,b){return b.pct-a.pct;});
  for(k in matchupRec) matchups.push(matchupRec[k]);
  matchups.sort(function(a,b){return b.n-a.n;});
  for(k in finals) finalsArr.push({n:k, v:finals[k]});
  finalsArr.sort(function(a,b){return b.v-a.v;});
  for(k in vice) viceArr.push({n:k, v:vice[k]});
  viceArr.sort(function(a,b){return b.v-a.v;});
  var threshold=pool.length*0.3, lateCand=[];
  for(k in plays){
    if(plays[k]>=15 && firstIdx[k]>threshold){
      lateCand.push({n:k, w:wins[k]||0, p:plays[k], pct:Math.round((wins[k]||0)/plays[k]*1000)/10,
                     sem: pool[firstIdx[k]] ? pool[firstIdx[k]].season : '?'});
    }
  }
  lateCand.sort(function(a,b){return b.pct-a.pct;});
  return {
    streaks:streaks, winrate:winrate, matchups:matchups, finals:finalsArr, vice:viceArr,
    podiumTally:podiumTally, bestStart:lateCand[0]||null, plays:plays, wins:wins
  };
}

/* ============================================================
   GESTÃO DE TEMPORADAS
   ============================================================ */
function seasonEtapaTallies(etapas){
  // c[1º,2º,3º] por jogador dentro da temporada + contagem de mesas finais (heads-up)
  var c={}, mf={}, i, j;
  for(i=0;i<etapas.length;i++){
    var r=etapas[i].results;
    for(j=0;j<r.length;j++){
      var nm=r[j].name, pos=r[j].pos;
      if(!c[nm]) c[nm]=[0,0,0];
      if(pos>=1 && pos<=3) c[nm][pos-1]++;
      if(pos===1 || pos===2){ mf[nm]=(mf[nm]||0)+1; }
    }
  }
  return {c:c, mf:mf};
}

  if(DEMO_MODE){ alert('Configure o Firebase primeiro.'); return; }
  var h='<h3>&#127942; Fechar temporada e come\u00e7ar a pr\u00f3xima</h3>';
  h+='<div class="muted" style="margin-bottom:12px">Isso arquiva as '+ETAPAS.length+' etapas da temporada atual ('+CONFIG.seasonName+'), soma p\u00f3dio/pontos/premia\u00e7\u00e3o no hist\u00f3rico permanente, e zera a tela para a pr\u00f3xima temporada.</div>';
  h+='<div class="field"><label>Nome da nova temporada</label><input id="nsName" placeholder="Ex: 1\u00ba Sem 2027"></div>';
  h+='<div class="field"><label>Data de in\u00edcio</label><input id="nsStart" type="date"></div>';

function confirmNewSeason(){
  var name=document.getElementById('nsName').value.trim();
  var start=document.getElementById('nsStart').value;
  var end=document.getElementById('nsEnd').value;
  if(!name || !start || !end){ alert('Preencha nome, in\u00edcio e fim da nova temporada.'); return; }
  if(ETAPAS.length===0){ alert('N\u00e3o h\u00e1 etapas lan\u00e7adas nesta temporada para arquivar.'); return; }
  if(!confirm('Confirma o fechamento de "'+CONFIG.seasonName+'" ('+ETAPAS.length+' etapas) e in\u00edcio de "'+name+'"? Essa a\u00e7\u00e3o arquiva os dados atuais e zera a tela.')) return;

  var closingName=CONFIG.seasonName, closingId=closingName.replace(/\s+/g,'_');
  var arr=classification().filter(function(p){return p.games>0;});
  var podium=[arr[0]?arr[0].name:'', arr[1]?arr[1].name:'', arr[2]?arr[2].name:''];

  // 1) arquiva as etapas (preserva tudo, para sempre)
  var batch=db.batch(), i;
  for(i=0;i<ETAPAS.length;i++){
    var e=ETAPAS[i];
    var ref=db.collection('archived_etapas').doc();
    var copy={}; for(var k in e){ if(k!=='_id') copy[k]=e[k]; }
    copy.season=closingId;
    batch.set(ref, copy);
  }
  batch.set(db.collection('seasons').doc(closingId), {
    name:closingName, start:CONFIG.start, end:CONFIG.end, rounds:ETAPAS.length, closedAt:new Date().toISOString()
  });
  batch.commit().then(function(){
    // 2) soma no histórico permanente (o que dá pra somar com exatidão)
    return db.collection('historico').doc('data').get();
  }).then(function(doc){
    var d = doc.exists ? doc.data() : {};
    var podiums = d.podiums || HIST_PODIUMS.slice();
    var points  = d.points  || HIST_POINTS.slice();
    var stats   = d.stats   || HIST_STATS.slice();

    podiums.push({s:closingName, p:podium});

    var i2, p2, found;
    for(i2=0;i2<arr.length;i2++){
      p2=arr[i2]; found=null;
      for(var k2=0;k2<points.length;k2++){ if(points[k2].name===p2.name){ found=points[k2]; break; } }
      if(!found){ found={name:p2.name, sem:0, total:0, avg:0}; points.push(found); }
      found.sem += 1; found.total += p2.total;
      found.avg = found.total/found.sem;
    }
    points.sort(function(a,b){ return b.total-a.total; });

    for(i2=0;i2<arr.length;i2++){
      p2=arr[i2]; found=null;
      for(var k3=0;k3<stats.length;k3++){ if(stats[k3].n===p2.name){ found=stats[k3]; break; } }
      if(!found){ found={n:p2.name, prem:0, net:0, a:[0,0,0]}; stats.push(found); }
      found.prem += p2.ganhoEtapas>0?p2.ganhoEtapas:0;
      found.net  += p2.ganho;
      // c[]/mf/t2/pod NÃO são mais somados aqui — a etapa que acabou de ser
      // arquivada já entra no cálculo ao vivo (computeLiveCuriosities), então
      // somar aqui também duplicaria a contagem.
    }

    HIST_PODIUMS=podiums; HIST_POINTS=points; HIST_STATS=stats;
    return db.collection('historico').doc('data').set({
      podiums:podiums, points:points, stats:stats,
      matchups:HIST_HU_MATCHUPS, finals:HIST_HU_FINALS, prizes:HIST_PRIZES,
      streaks:HIST_STREAKS, winrate:HIST_WINRATE, beststart:HIST_BEST_START,
      updatedAt:new Date().toISOString()
    });
  }).then(function(){
    // 3) apaga as etapas da coleção ativa (já estão arquivadas)
    return db.collection('etapas').get();
  }).then(function(snap){
    var delBatch=db.batch();
    snap.forEach(function(d){ delBatch.delete(d.ref); });
    return delBatch.commit();
  }).then(function(){
    // 4) configura a nova temporada
    return db.collection('config').doc('current').set({seasonName:name, start:start, end:end, rounds:CONFIG.rounds});
  }).then(function(){
    CONFIG.seasonName=name; CONFIG.start=start; CONFIG.end=end;
    closeModal();
    alert('Temporada "'+closingName+'" arquivada. Bem-vindo \u00e0 "'+name+'"!');
    loadAll(); loadSeasonsList();
  }).catch(function(e){ alert('Erro ao fechar temporada: '+e.message); });
}
function openSeasonBrowser(){
  var h='<h3>&#128193; Consultar temporada</h3>';
  h+='<div class="field"><label>Escolha</label><select id="seasonPick">';
  h+='<option value="__current__">'+CONFIG.seasonName+' (atual, em aberto)</option>';
  var i;
  for(i=0;i<SEASONS_LIST.length;i++) h+='<option value="'+SEASONS_LIST[i]._id+'">'+SEASONS_LIST[i].name+'</option>';
  h+='</select></div>';
  h+='<div class="row-flex"><button class="btn" onclick="showSeasonArchive()">Ver classifica\u00e7\u00e3o</button><button class="btn ghost" onclick="closeModal()">Fechar</button></div>';
  h+='<div id="seasonArchiveOut" style="margin-top:14px"></div>';
  openModal(h);
}
function showSeasonArchive(){
  var pick=document.getElementById('seasonPick').value;
  var out=document.getElementById('seasonArchiveOut');
  if(pick==='__current__'){
    out.innerHTML=renderSeasonRanking(classification().filter(function(p){return p.games>0;}));
    return;
  }
  out.innerHTML='<div class="muted">Carregando\u2026</div>';
  db.collection('archived_etapas').where('season','==',pick).orderBy('n').get().then(function(snap){
    var arr=[]; snap.forEach(function(d){ var x=d.data(); if(!x.pay) x.pay={}; arr.push(x); });
    var cls=classification(undefined, arr).filter(function(p){return p.games>0;});
    out.innerHTML=renderSeasonRanking(cls);
  }).catch(function(e){ out.innerHTML='<div class="muted">Erro: '+e.message+'</div>'; });
}
function renderSeasonRanking(arr){
  var h='<table><thead><tr><th>#</th><th>Jogador</th><th class="ctr">Pontos</th></tr></thead><tbody>';
  for(var i=0;i<arr.length;i++) h+='<tr><td>'+(i+1)+'\u00ba</td><td>'+arr[i].name+'</td><td class="ctr"><b>'+arr[i].total+'</b></td></tr>';
  h+='</tbody></table>';
  return h;
}

function seedPlayersFB(){
  if(DEMO_MODE){ alert('Configure o Firebase primeiro.'); return; }
  if(PLAYERS.length>0 && !confirm('J\u00e1 existem '+PLAYERS.length+' jogadores no banco. Popular de novo vai DUPLICAR o elenco. Continuar mesmo assim?')) return;
  var batch=db.batch(), i;
  for(i=0;i<DEFAULT_PLAYERS.length;i++){
    var p=DEFAULT_PLAYERS[i];
    batch.set(db.collection('players').doc(), {login:p.login, name:p.name, pix:'', active:true, order:i});
  }
  batch.commit().then(function(){ alert('Jogadores criados no banco.'); loadAll(); })
    .catch(function(e){ alert('Erro: '+e.message); });
}
function dedupPlayersFB(){
  if(DEMO_MODE){ alert('Configure o Firebase primeiro.'); return; }
  var seen={}, toDelete=[], i;
  for(i=0;i<PLAYERS.length;i++){
    var p=PLAYERS[i], key=(p.name||'').trim().toLowerCase();
    if(!key) continue;
    if(seen[key]){ toDelete.push(p); } else { seen[key]=p; }
  }
  if(toDelete.length===0){ alert('Nenhum duplicado encontrado.'); return; }
  if(!confirm('Encontrados '+toDelete.length+' registros duplicados (mesmo nome). Remover as c\u00f3pias extras, mantendo a primeira de cada?')) return;
  var batch=db.batch();
  for(i=0;i<toDelete.length;i++){ if(toDelete[i]._id) batch.delete(db.collection('players').doc(toDelete[i]._id)); }
  batch.commit().then(function(){ alert('Removidos '+toDelete.length+' duplicados.'); loadAll(); })
    .catch(function(e){ alert('Erro: '+e.message); });
}
function seedEtapa1FB(){
  if(DEMO_MODE){ alert('Configure o Firebase primeiro.'); return; }
  var etapa=DEMO_ETAPAS[0]; // resultado real da etapa 1 (19/07/2026)
  db.collection('etapas').doc('etapa-1').set(etapa)
    .then(function(){ alert('Etapa 1 (real) salva no banco!'); loadAll(); })
    .catch(function(e){ alert('Erro: '+e.message); });
}

initApp();
